name: Deploy to Vercel

on:
  push:
    branches: [ main ]

concurrency:
  group: deployment
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: https://svgoi-appraisal.vercel.app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run typecheck
        run: pnpm typecheck

      - name: Build projects
        run: pnpm build

      - name: Deploy to Vercel (Web)
        uses: vercel/action@v5
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
          working-directory: apps/web
          production: true

      - name: Deploy to Vercel (API)
        uses: vercel/action@v5
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_API }}
          working-directory: apps/api
          production: true

      - name: Deployment notification
        if: always()
        run: |
          echo "Deployment status: ${{ job.status }}"
          echo "Frontend: ${{ secrets.VERCEL_FRONTEND_URL }}"
          echo "API: ${{ secrets.VERCEL_API_URL }}"
